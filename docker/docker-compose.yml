services:
  agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - ../.env
    volumes:
      - agent-workdir:/home/agent/work
      - ../logs:/home/agent/logs
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"

  webhook-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    env_file:
      - ../.env
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  agent-workdir:
