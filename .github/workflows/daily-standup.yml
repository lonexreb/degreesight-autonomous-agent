# Daily agent standup - posts summary to Slack
# Install on target repos, not this repo
name: Daily Agent Standup

on:
  schedule:
    - cron: "0 22 * * *" # 5 PM CDT (UTC-5)
  workflow_dispatch: # Allow manual trigger

jobs:
  standup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate standup
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Generate a daily standup summary. Check:
            1. PRs created/merged in last 24h by the agent
            2. Open PRs awaiting review
            3. CI failures
            Report the findings concisely.
          max_turns: 15

      - name: Post to Slack
        if: success()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST "$SLACK_WEBHOOK" \
            -H 'Content-type: application/json' \
            -d '{"text":"Daily agent standup completed. Check GitHub Actions for details."}'
